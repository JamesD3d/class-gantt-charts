<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Projects Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-color: #38bdf8;
            --tab-bg: #0f172a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            border: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .tab-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Project List Styling */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .project-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .project-card:hover {
            background-color: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .project-info h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            color: var(--text-main);
        }

        .project-info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .arrow {
            color: var(--accent-color);
            font-size: 1.5rem;
            transition: transform 0.2s ease;
        }

        .project-card:hover .arrow {
            transform: translateX(4px);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background-color: rgba(0,0,0,0.1);
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Class Projects Dashboard</h1>
    <p class="subtitle">Select a subject below.</p>

    <!-- Tabs Container -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tech-eng-design')">Technology Engineering and Design</button>
        <button class="tab-btn" onclick="switchTab('eng-design')">Engineering and Design</button>
    </div>

    <!-- Tab Contents -->
    <div id="tech-eng-design" class="tab-content active">
        <div class="project-list">
            <a href="shelf-bracket.html" class="project-card">
                <div class="project-info">
                    <h2>Shelf Bracket Project</h2>
                    <p>Timeline for CAD, simulation, and 12-day 3D printing schedule.</p>
                </div>
                <div class="arrow">→</div>
            </a>
            <!-- New projects block -->
        </div>
    </div>

    <div id="eng-design" class="tab-content">
        <div class="project-list">
            <div class="empty-state">
                <p>No project timelines have been added to this class yet.</p>
                <p><i>Add new markdown-based timelines to the folder to populate this list.</i></p>
            </div>
        </div>
    </div>

</div>

<script>
    function switchTab(tabId) {
        // Remove active class from all buttons and contents
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        // Add active class to clicked tab and corresponding content
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }
</script>

</body>
</html>
